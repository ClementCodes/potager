# =============================================================================
# PotagerAI — Infrastructure de développement local
# Usage : docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Base de données principale
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: potagerai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: potagerai
      POSTGRES_USER: potagerai_user
      POSTGRES_PASSWORD: potagerai_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U potagerai_user -d potagerai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # pgAdmin 4 — Interface d'administration BDD (optionnel)
  # Accessible sur : http://localhost:5050
  # Login : admin@potagerai.com / admin
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: potagerai-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@potagerai.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
