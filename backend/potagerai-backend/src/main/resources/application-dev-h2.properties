# =============================================================================
# PotagerAI — Profil dev-h2 (sans Docker, sans PostgreSQL)
# Usage : mvn spring-boot:run -Dspring-boot.run.profiles=dev-h2
# =============================================================================

# H2 en mode PostgreSQL (fichier local = données persistées entre les démarrages)
spring.datasource.url=jdbc:h2:file:./potagerai-dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 accessible sur http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA — laisser Flyway gérer le schéma, pas de validation (CHAR vs VARCHAR différent en H2)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Flyway — utilise les mêmes migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (clé dev)
jwt.secret=potagerai-dev-secret-key-minimum-256-bits-long-for-hs256-algorithm-ok
jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:4200
