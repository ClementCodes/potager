# =============================================================================
# PotagerAI — Configuration tests (H2 in-memory, Flyway désactivé)
# =============================================================================

# H2 en mode compatibilité PostgreSQL
spring.datasource.url=jdbc:h2:mem:potageraitest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crée le schéma depuis les entités JPA (pas Flyway)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Désactiver Flyway pour les tests
spring.flyway.enabled=false

# JWT de test (non secret, uniquement pour les tests)
jwt.secret=test-secret-key-for-junit-tests-minimum-256-bits-long-padded-here

# CORS test
app.cors.allowed-origins=http://localhost:4200

# Désactiver Swagger en test
springdoc.swagger-ui.enabled=false
