# =============================================================================
# PotagerAI — Configuration développement local
# =============================================================================

spring.application.name=potagerai-backend

# -----------------------------------------------------------------------------
# Base de données PostgreSQL
# Valeurs par défaut pour le dev (docker-compose.yml)
# En production, injecter via variables d'environnement : DB_URL, DB_USER, DB_PASS
# -----------------------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/potagerai}
spring.datasource.username=${DB_USER:potagerai_user}
spring.datasource.password=${DB_PASS:potagerai_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# -----------------------------------------------------------------------------
# JPA / Hibernate
# validate : Hibernate vérifie le schéma sans le modifier (Flyway gère le DDL)
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# -----------------------------------------------------------------------------
# Flyway — Migrations automatiques au démarrage
# -----------------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# -----------------------------------------------------------------------------
# Sécurité JWT
# IMPORTANT : En production, utiliser une vraie clé secrète >= 256 bits via JWT_SECRET
# -----------------------------------------------------------------------------
jwt.secret=${JWT_SECRET:potagerai-dev-secret-key-minimum-256-bits-long-for-hs256-algorithm-ok}
jwt.expiration-ms=86400000

# -----------------------------------------------------------------------------
# CORS — Autorise le frontend Angular (séparation back/front)
# -----------------------------------------------------------------------------
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200}

# -----------------------------------------------------------------------------
# Java 21 Virtual Threads — améliore les performances I/O (appels API externes)
# -----------------------------------------------------------------------------
spring.threads.virtual.enabled=true

# -----------------------------------------------------------------------------
# Actuator — Health check
# -----------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=PotagerAI
info.app.version=0.1.0

# -----------------------------------------------------------------------------
# Swagger / OpenAPI — http://localhost:8080/swagger-ui.html
# -----------------------------------------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
